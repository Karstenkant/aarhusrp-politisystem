<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLITI Portal - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-logo">
            <img src="midt vest.png" alt="Logo" width="100">
        </div>
        <h1>POLITI PORTAL</h1>
        <p>MDT Terminal - Midt- og Vestjyllands Politi</p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="login-pnum">P-Nummer</label>
                <input type="text" id="login-pnum" placeholder="F.eks. P-001" required>
            </div>
            <div class="input-group">
                <label for="login-password">Adgangskode</label>
                <input type="password" id="login-password" placeholder="Indtast din kode" required>
            </div>
            
            <button type="submit" id="login-btn" class="btn-primary">LOG IND I MDT</button>
            <div id="login-msg" class="error-msg" style="margin-top: 1.5rem; text-align: center; color: var(--error-red);"></div>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.75rem; color: var(--police-text-muted);">
            Denne terminal er kun til brug for autoriseret personale.<br>
            Misbrug medfører øjeblikkelig afskedigelse.
        </div>
    </div>

    <!-- PÅ VAGT LOADING MODAL -->
    <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.9); z-index:1000; align-items:center; justify-content:center; flex-direction:column;">
        <div style="width:50px; height:50px; border:4px solid var(--police-border); border-top:4px solid var(--police-accent); border-radius:50%; animation: spin 0.8s linear infinite;"></div>
        <h2 style="margin-top:20px; letter-spacing:2px; font-size:1.2rem;">KLARGØR MDT TERMINAL...</h2>
        <p id="loading-status" style="margin-top:10px; color:var(--police-text-muted);">Henter flåde-data...</p>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        // Logik til P-nummer login (vi finder emailen bag P-nummeret før vi logger ind)
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pnum = document.getElementById('login-pnum').value.toUpperCase().trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('login-msg');

            btn.disabled = true;
            btn.innerText = 'VALIDERER...';

            try {
                // Find emailen i 'betjente' baseret på P-nummer (uanset store/små bogstaver)
                const { data: betjent, error: findError } = await _supabase
                    .from('betjente')
                    .select('email')
                    .ilike('p_nummer', pnum)
                    .single();

                if (findError || !betjent) throw new Error('P-nummer ikke fundet i databasen.');

                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: betjent.email,
                    password: password
                });

                if (error) throw error;

                // Vis loading animation
                document.getElementById('loading-overlay').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('loading-status').innerText = 'Forbinder til patrulje-netværk...';
                }, 800);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (err) {
                msg.innerText = 'FEJL: ' + err.message;
                btn.disabled = false;
                btn.innerText = 'LOG IND I MDT';
            }
        });

        // Tjek om allerede logget ind
        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        };
    </script>
</body>
</html>
